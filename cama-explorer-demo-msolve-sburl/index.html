<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>South Burlington CAMA Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; overflow: hidden; }
        #map-view { height: 100vh; width: 100%; }
        .table-container::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-container::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        .loader { border-top-color: #005a3c; animation: spin 1s linear infinite; border-right-color: transparent; border-radius: 50%; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .row-hover:hover { background-color: #f0fdf4; cursor: pointer; }
    </style>
</head>
<body class="antialiased text-gray-800">

    <div class="flex h-screen">
        <div class="w-3/5 h-screen overflow-y-auto bg-gray-50 relative shadow-xl z-10" id="left-pane">
            <div class="p-6 lg:p-8">
                <header class="mb-6">
                    <h1 class="text-3xl font-bold text-gray-900 mb-2">South Burlington CAMA Viewer</h1>
                    <p class="text-gray-600 text-sm">Demonstrating normalized multi-silo property data linking to spatial SPANs.</p>
                </header>

                <div id="main-view">
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200 mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Search by Address, SPAN, or CAMA ID</label>
                        <input type="text" id="search-input" placeholder="e.g., 'Main St', '05404', or '123-456'" class="w-full p-2.5 border border-gray-300 rounded-md focus:ring-2 focus:ring-[#005a3c] focus:border-[#005a3c] outline-none transition-all">
                    </div>

                    <div id="status-message" class="bg-white p-8 rounded-lg shadow-sm border border-gray-200 flex flex-col items-center justify-center min-h-[300px]">
                        <p class="text-gray-500 text-center">Loading initial data schemas...</p>
                    </div>

                    <div id="table-wrapper" class="hidden bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                        <div class="px-4 py-3 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                            <h2 class="font-semibold text-gray-800">Search Results</h2>
                            <span id="result-count" class="text-xs font-bold px-2 py-1 bg-gray-200 rounded-full text-gray-700">0</span>
                        </div>
                        <div class="overflow-x-auto table-container">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-white">
                                    <tr>
                                        <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase">Type</th>
                                        <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase">SPAN</th>
                                        <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase">CAMA ID</th>
                                        <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase">Address</th>
                                        <th class="px-4 py-3 text-left text-xs font-bold text-gray-500 uppercase">City</th>
                                    </tr>
                                </thead>
                                <tbody id="results-body" class="bg-white divide-y divide-gray-100"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div id="detail-view" class="hidden">
                    <button id="back-btn" class="mb-4 inline-flex items-center px-4 py-2 bg-gray-800 text-white text-sm font-medium rounded hover:bg-gray-700 transition">
                        <i class="fa-solid fa-arrow-left mr-2"></i> Back to Results
                    </button>
                    
                    <div id="contextual-banner" class="bg-white p-5 rounded-lg shadow-sm border border-gray-200 mb-6 relative overflow-hidden">
                        </div>

                    <div class="mb-4 border-b border-gray-200">
                        <ul id="tabs-header" class="flex flex-wrap -mb-px text-sm font-medium text-center">
                            </ul>
                    </div>

                    <div id="tabs-content" class="min-h-[400px]">
                        </div>
                </div>
            </div>
        </div>

        <div class="w-2/5 h-screen bg-gray-200">
            <div id="map-view"></div>
        </div>
    </div>

    <script src="https://js.arcgis.com/4.29/"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        
        // --- 1. CONFIGURATION & DATA DICTIONARIES ---
        const S3_BASE = 'https://vtopendata-prd.s3.us-east-2.amazonaws.com/_Other/CAMA/sample-microsolve-sburl';
        let masterIndex = []; 
        let mapView, parcelLayer, highlightHandle;

        // Silo configurations for UI and dynamic routing
        const SILOS = {
            res: { name: 'Residential', color: 'bg-blue-100 text-blue-900 border-blue-200', icon: 'fa-house' },
            comm: { name: 'Commercial', color: 'bg-orange-100 text-orange-900 border-orange-200', icon: 'fa-city' },
            condo: { name: 'Condominium', color: 'bg-purple-100 text-purple-900 border-purple-200', icon: 'fa-building' }
        };

        // --- 2. INITIALIZATION ---
        async function init() {
            showLoader("Downloading Master Index...");
            await loadMasterIndex();
            await initMap();
            
            document.getElementById('search-input').addEventListener('input', handleSearch);
            document.getElementById('back-btn').addEventListener('click', () => {
                document.getElementById('detail-view').classList.add('hidden');
                document.getElementById('main-view').classList.remove('hidden');
            });
            
            showMessage("Ready. Search or click a map parcel.");
        }

        // --- 3. DATA PIPELINE (NORMALIZATION) ---
        async function loadMasterIndex() {
            // Load all three hubs concurrently
            const [resData, commData, condoData] = await Promise.all([
                fetchJson(`${S3_BASE}/res/EXP_MAIN_RES.json`),
                fetchJson(`${S3_BASE}/comm/EXP_MAIN_COMM.json`),
                fetchJson(`${S3_BASE}/condo/EXP_MAIN_CONDO.json`)
            ]);

            // Normalize and tag schema variations into a standard Master object
            const normalize = (data, silo) => {
                if(!data) return [];
                return data.map(row => ({
                    silo: silo,
                    parcel_id: row.parcel_id || '',
                    span: row.parc_span || '',
                    address: silo === 'comm' ? (row.prop_addr || '') : (row.prop_locat || ''),
                    city: silo === 'comm' ? (row.prop_city || '') : (row.city || ''),
                    zip: silo === 'comm' ? (row.prop_zip || '') : (row.zip_code || ''),
                    owner: row.owner_name || '',
                    // Keep original raw data for detail view
                    raw: row 
                }));
            };

            masterIndex = [
                ...normalize(resData, 'res'),
                ...normalize(commData, 'comm'),
                ...normalize(condoData, 'condo')
            ];
            console.log(`Loaded ${masterIndex.length} Master Index records.`);
        }

        async function fetchJson(url) {
            try {
                const res = await fetch(url);
                return res.ok ? await res.json() : null;
            } catch (e) {
                console.error("Fetch error:", e); return null;
            }
        }

        // --- 4. MAP INTEGRATION ---
        async function initMap() {
            require([
                "esri/Map", "esri/views/MapView", "esri/layers/FeatureLayer"
            ], (Map, MapView, FeatureLayer) => {
                
                parcelLayer = new FeatureLayer({
                    url: "https://services1.arcgis.com/BkFxaEFNwHqX3tAw/arcgis/rest/services/FS_VCGI_OPENDATA_Cadastral_VTPARCELS_poly_standardized_parcels_SP_v1/FeatureServer/0",
                    definitionExpression: "TOWN = 'SOUTH BURLINGTON'",
                    outFields: ["SPAN"],
                    popupEnabled: false,
                    renderer: {
                        type: "simple",
                        symbol: { type: "simple-fill", color: [0, 0, 0, 0], outline: { color: [150, 150, 150, 0.8], width: "1px" }}
                    }
                });

                mapView = new MapView({
                    container: "map-view",
                    map: new Map({ basemap: "hybrid", layers: [parcelLayer] }),
                    center: [-73.17, 44.46], // South Burlington
                    zoom: 13
                });

                mapView.on("click", (event) => {
                    mapView.hitTest(event).then((response) => {
                        const graphic = response.results.find(r => r.graphic.layer === parcelLayer)?.graphic;
                        if (graphic) {
                            highlightFeature(graphic);
                            const span = graphic.attributes.SPAN;
                            handleMapClick(span);
                        } else {
                            if(highlightHandle) highlightHandle.remove();
                        }
                    });
                });
            });
        }

        function highlightFeature(graphic) {
            if(highlightHandle) highlightHandle.remove();
            mapView.whenLayerView(graphic.layer).then(layerView => {
                highlightHandle = layerView.highlight(graphic);
            });
        }

        // --- 5. SEARCH & ROUTING LOGIC ---
        function handleSearch(e) {
            const term = e.target.value.toLowerCase();
            if (term.length < 2) {
                document.getElementById('table-wrapper').classList.add('hidden');
                showMessage("Ready. Search or click a map parcel.");
                return;
            }
            
            const results = masterIndex.filter(r => 
                r.address.toLowerCase().includes(term) || 
                r.span.toLowerCase().includes(term) || 
                r.parcel_id.toLowerCase().includes(term)
            );
            
            renderTable(results);
        }

        function handleMapClick(span) {
            if(!span) return;
            const cleanSpan = String(span).trim();
            const results = masterIndex.filter(r => String(r.span).trim() === cleanSpan);
            
            document.getElementById('search-input').value = cleanSpan;
            
            if (results.length === 1) {
                // Scenario A: 1-to-1 match. Go straight to detail view.
                renderTable(results); // keep table updated in background
                openDetailView(results[0].parcel_id, results[0].silo);
            } else if (results.length > 1) {
                // Scenario B: 1-to-Many match. Force user to use the selector table.
                renderTable(results);
                showMessage(`Found ${results.length} records for this parcel. Please select one below.`);
            } else {
                renderTable([]);
                showMessage("No CAMA records found for this footprint.");
            }
        }

        // --- 6. UI RENDERING ---
        function renderTable(results) {
            document.getElementById('status-message').classList.add('hidden');
            document.getElementById('table-wrapper').classList.remove('hidden');
            document.getElementById('result-count').textContent = results.length;
            
            const tbody = document.getElementById('results-body');
            tbody.innerHTML = '';

            results.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'row-hover transition';
                const s = SILOS[row.silo];

                tr.innerHTML = `
                    <td class="px-4 py-3 whitespace-nowrap">
                        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-semibold border ${s.color}">
                            <i class="fa-solid ${s.icon} mr-1.5"></i> ${s.name}
                        </span>
                    </td>
                    <td class="px-4 py-3 text-sm font-medium text-gray-900">${row.span || 'N/A'}</td>
                    <td class="px-4 py-3 text-sm text-gray-600">${row.parcel_id}</td>
                    <td class="px-4 py-3 text-sm text-gray-800">${row.address}</td>
                    <td class="px-4 py-3 text-sm text-gray-600">${row.city}</td>
                `;
                tr.onclick = () => openDetailView(row.parcel_id, row.silo);
                tbody.appendChild(tr);
            });
        }

        function openDetailView(parcelId, siloType) {
            const recordInfo = masterIndex.find(r => r.parcel_id === parcelId && r.silo === siloType);
            const siblings = masterIndex.filter(r => r.span === recordInfo.span);
            
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');

            // 1. Build Contextual Banner
            const s = SILOS[siloType];
            const banner = document.getElementById('contextual-banner');
            banner.className = `p-6 rounded-lg shadow-sm border mb-6 relative overflow-hidden ${s.color.replace('text-', 'text-').replace('bg-', 'bg-').replace('100', '50')}`; // Lighten background
            banner.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <span class="inline-flex items-center px-2.5 py-1 rounded border ${s.color} text-xs font-bold uppercase tracking-wider mb-3">
                            <i class="fa-solid ${s.icon} mr-2"></i> ${s.name} Record
                        </span>
                        <h2 class="text-3xl font-bold text-gray-900 mb-1">${recordInfo.address}</h2>
                        <p class="text-sm font-medium text-gray-700">Owner: ${recordInfo.owner}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm text-gray-600 mb-1">CAMA ID: <span class="font-bold text-gray-900">${parcelId}</span></p>
                        <p class="text-sm text-gray-600 mb-2">SPAN: <span class="font-bold text-gray-900">${recordInfo.span}</span></p>
                        ${siblings.length > 1 ? `<span class="inline-flex bg-white px-2 py-1 rounded text-xs font-bold border border-gray-300 shadow-sm"><i class="fa-solid fa-layer-group text-blue-600 mr-1"></i> Record 1 of ${siblings.length} for SPAN</span>` : ''}
                    </div>
                </div>
            `;

            // 2. Dynamic Tabs Framework
            buildDynamicTabs(siloType, siblings.length > 1, siblings, parcelId);
        }

        function buildDynamicTabs(siloType, hasSiblings, siblings, currentParcelId) {
            const tabsHeader = document.getElementById('tabs-header');
            const tabsContent = document.getElementById('tabs-content');
            tabsHeader.innerHTML = ''; tabsContent.innerHTML = '';

            // Define which tabs belong to which silo based on the data dictionary
            const tabConfig = [
                { id: 'overview', name: 'Overview', universal: true },
                { id: 'bldg', name: 'Building Details', res: true, condo: true, comm: true },
                { id: 'land', name: 'Land & Site', universal: true },
                { id: 'occupancy', name: 'Occupancy & Income', comm: true }, // Comm specific
                { id: 'amenities', name: 'Amenities', condo: true }, // Condo specific
                { id: 'history', name: 'Sales History', universal: true },
                { id: 'associated', name: 'Associated Records', conditional: hasSiblings }
            ];

            // Filter tabs based on current silo
            const activeTabs = tabConfig.filter(t => t.universal || t[siloType] || t.conditional);

            activeTabs.forEach((tab, index) => {
                // Header List Item
                const li = document.createElement('li');
                li.className = 'mr-2';
                const a = document.createElement('a');
                a.className = `inline-block p-4 rounded-t-lg border-b-2 hover:text-gray-600 hover:border-gray-300 cursor-pointer transition ${index === 0 ? 'text-[#005a3c] border-[#005a3c] bg-white' : 'border-transparent text-gray-500'}`;
                a.innerText = tab.name;
                a.onclick = (e) => switchTab(e, tab.id);
                li.appendChild(a);
                tabsHeader.appendChild(li);

                // Content Pane
                const div = document.createElement('div');
                div.id = `tab-${tab.id}`;
                div.className = `p-6 bg-white rounded-b-lg shadow-sm border border-t-0 border-gray-200 ${index === 0 ? '' : 'hidden'}`;
                
                if (tab.id === 'associated') {
                    div.innerHTML = renderAssociatedRecordsTab(siblings, currentParcelId);
                } else {
                    div.innerHTML = `<p class="text-gray-500 italic">Data fetcher for ${siloType} -> ${tab.name} goes here.</p>
                                     <p class="text-xs text-gray-400 mt-2">Will pull dynamically from /${siloType}/ S3 directory based on parcel_id.</p>`;
                }
                
                tabsContent.appendChild(div);
            });
        }

        function renderAssociatedRecordsTab(siblings, currentParcelId) {
            let html = '<h3 class="text-lg font-bold mb-4">Other Records sharing this Polygon footprint:</h3><div class="space-y-3">';
            siblings.forEach(sib => {
                const isCurrent = sib.parcel_id === currentParcelId;
                const s = SILOS[sib.silo];
                html += `
                    <div class="p-4 border rounded flex justify-between items-center ${isCurrent ? 'bg-gray-50 border-gray-300' : 'bg-white hover:border-gray-400 cursor-pointer'}" 
                         ${!isCurrent ? `onclick="document.getElementById('search-input').value='${sib.parcel_id}'; document.getElementById('search-input').dispatchEvent(new Event('input'));"` : ''}>
                        <div>
                            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-semibold border mb-1 ${s.color}">${s.name}</span>
                            <p class="font-medium text-gray-900">${sib.address} (ID: ${sib.parcel_id})</p>
                        </div>
                        <div>
                            ${isCurrent ? '<span class="text-xs font-bold text-gray-400 uppercase">Currently Viewing</span>' : '<button class="text-sm font-medium text-blue-600 hover:text-blue-800">View Record &rarr;</button>'}
                        </div>
                    </div>
                `;
            });
            return html + '</div>';
        }

        function switchTab(event, tabId) {
            const links = document.getElementById('tabs-header').querySelectorAll('a');
            links.forEach(l => {
                l.className = 'inline-block p-4 rounded-t-lg border-b-2 border-transparent text-gray-500 hover:text-gray-600 hover:border-gray-300 cursor-pointer transition';
            });
            event.target.className = 'inline-block p-4 rounded-t-lg border-b-2 text-[#005a3c] border-[#005a3c] bg-white cursor-pointer transition';

            const panes = document.getElementById('tabs-content').children;
            Array.from(panes).forEach(p => p.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
        }

        // --- UTILS ---
        function showLoader(msg) {
            document.getElementById('status-message').classList.remove('hidden');
            document.getElementById('table-wrapper').classList.add('hidden');
            document.getElementById('status-message').innerHTML = `<div class="loader w-10 h-10 border-4 mb-4"></div><p class="text-gray-500 font-medium">${msg}</p>`;
        }
        function showMessage(msg) {
            document.getElementById('status-message').classList.remove('hidden');
            document.getElementById('table-wrapper').classList.add('hidden');
            document.getElementById('status-message').innerHTML = `<p class="text-gray-500 font-medium">${msg}</p>`;
        }

        // Boot
        init();
    });
    </script>
</body>
</html>
